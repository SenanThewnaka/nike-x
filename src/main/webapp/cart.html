<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Nike-X</title>
    <meta name="description"
        content="Review and manage your Nike-X shopping cart. Proceed to checkout for fast and secure delivery.">
    <meta property="og:title" content="Your Cart | Nike-X">
    <meta property="og:description" content="Check out your Nike-X cart and complete your order.">
    <meta property="og:type" content="website">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-dark': '#0f0f11',
                        'brand-accent': '#3b82f6',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-black text-white antialiased selection:bg-green-500 selection:text-white">

    <!-- Gradient Background -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
        <div class="gradient-blob top-[-20%] left-[-10%]"></div>
        <div class="gradient-blob bottom-[-20%] right-[-10%] bg-emerald-600/30 w-[800px] h-[800px]"></div>
    </div>

    <!-- Header -->
    <div id="header-placeholder"></div>
    <script src="assets/js/components/header.js"></script>
    <script>
        loadHeader();
    </script>

    <!-- Main Content -->
    <main class="relative z-10 pt-32 pb-24 min-h-screen">
        <div class="container mx-auto px-6">
            <h1 class="text-4xl md:text-5xl font-bold mb-12">Your <span class="text-green-500">Cart</span></h1>

            <div class="grid lg:grid-cols-3 gap-12">
                <!-- Cart Items List -->
                <div class="lg:col-span-2 space-y-6" id="cart-items-container">
                    <!-- Loading State -->
                    <div class="glass-panel p-8 rounded-3xl text-center">
                        <div
                            class="animate-spin inline-block w-8 h-8 border-4 border-green-500 border-t-transparent rounded-full mb-4">
                        </div>
                        <p class="text-gray-400">Loading your gear...</p>
                    </div>
                </div>

                <!-- Order Summary -->
                <div class="lg:col-span-1">
                    <div class="glass-panel p-8 rounded-3xl sticky top-32">
                        <h2 class="text-2xl font-bold mb-6">Order Summary</h2>
                        <div class="space-y-4 mb-8">
                            <div class="flex justify-between text-gray-400">
                                <span>Subtotal</span>
                                <span id="summary-subtotal" class="text-white font-medium">$0.00</span>
                            </div>
                            <div class="flex justify-between text-gray-400">
                                <span>Shipping</span>
                                <span id="summary-shipping" class="text-green-500 font-medium">Free</span>
                            </div>
                            <div class="h-px bg-white/10 my-4"></div>
                            <div class="flex justify-between text-xl font-bold">
                                <span>Total</span>
                                <span id="summary-total" class="text-green-500">$0.00</span>
                            </div>
                        </div>
                        <button onclick="proceedToCheckout()"
                            class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl transition-all shadow-[0_0_20px_rgba(34,197,94,0.3)] hover:shadow-[0_0_30px_rgba(34,197,94,0.5)] mb-4">
                            Proceed to Checkout
                        </button>
                        <a href="index.html#drops"
                            class="block text-center text-gray-400 hover:text-white transition-colors text-sm">
                            Continue Shopping
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>
    <script src="assets/js/components/footer.js"></script>
    <script>
        loadFooter();
    </script>

    <!-- Scripts -->
    <script src="assets/js/notiflix-aio-3.2.8.min.js"></script>
    <script src="assets/js/cart.js?v=2"></script>
</body>

</html>
