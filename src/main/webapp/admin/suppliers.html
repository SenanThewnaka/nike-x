<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike-X | Supplier Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Orbitron:wght@500;700;900&family=Oswald:wght@400;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body class="bg-black text-white h-screen overflow-hidden font-sans selection:bg-nike-green selection:text-black">

    <!-- Gradient Background Drops -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
        <div class="gradient-blob top-[-20%] left-[-10%]"></div>
        <div class="gradient-blob bottom-[-20%] right-[-10%] bg-emerald-600/30 w-[800px] h-[800px]"></div>
    </div>

    <div class="flex h-full tech-grid relative z-10">

        <!-- Mobile Sidebar Overlay -->
        <div id="sidebar-overlay" onclick="toggleSidebar()"
            class="fixed inset-0 bg-black/80 backdrop-blur-sm z-40 hidden md:hidden"></div>

        <!-- Sidebar -->
        <aside id="sidebar"
            class="fixed inset-y-0 left-0 z-50 w-64 glass-card-desktop border-r border-white/5 flex flex-col transform transition-transform duration-300 -translate-x-full md:translate-x-0 md:static md:inset-auto">
            <!-- Logo -->
            <div class="h-20 flex items-center justify-between px-8 border-b border-white/5">
                <h2 class="font-futuristic text-2xl font-bold tracking-widest text-white">NIKE<span
                        class="text-nike-green">-X</span></h2>
                <button onclick="toggleSidebar()" class="md:hidden text-zinc-400 hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <!-- Navigation -->
            <nav class="flex-1 py-8 px-4 space-y-2 overflow-y-auto">
                <a href="dashboard.html"
                    class="flex items-center gap-4 px-4 py-3 text-zinc-400 hover:text-white hover:bg-white/5 rounded-lg transition-all group">
                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="h-5 w-5 group-hover:text-nike-green transition-colors" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                    </svg>
                    <span class="font-futuristic text-sm tracking-wide">DASHBOARD</span>
                </a>

                <a href="products.html"
                    class="flex items-center gap-4 px-4 py-3 text-zinc-400 hover:text-white hover:bg-white/5 rounded-lg transition-all group">
                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="h-5 w-5 group-hover:text-nike-green transition-colors" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                    </svg>
                    <span class="font-futuristic text-sm tracking-wide">PRODUCTS</span>
                </a>

                <a href="orders.html"
                    class="flex items-center gap-4 px-4 py-3 text-zinc-400 hover:text-white hover:bg-white/5 rounded-lg transition-all group">
                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="h-5 w-5 group-hover:text-nike-green transition-colors" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                    </svg>
                    <span class="font-futuristic text-sm tracking-wide">ORDERS</span>
                </a>

                <a href="users.html"
                    class="flex items-center gap-4 px-4 py-3 text-zinc-400 hover:text-white hover:bg-white/5 rounded-lg transition-all group">
                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="h-5 w-5 group-hover:text-nike-green transition-colors" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                    <span class="font-futuristic text-sm tracking-wide">USERS</span>
                </a>

                <a href="suppliers.html"
                    class="flex items-center gap-4 px-4 py-3 bg-nike-green/10 text-nike-green rounded-lg border border-nike-green/20 transition-all group">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                    </svg>
                    <span class="font-futuristic text-sm tracking-wide">SUPPLIERS</span>
                </a>

                <a href="grn.html"
                    class="flex items-center gap-4 px-4 py-3 text-zinc-400 hover:text-white hover:bg-white/5 rounded-lg transition-all group">
                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="h-5 w-5 group-hover:text-nike-green transition-colors" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                    </svg>
                    <span class="font-futuristic text-sm tracking-wide">GRN</span>
                </a>
            </nav>

            <!-- User Profile -->
            <div class="p-4 border-t border-white/5">
                <div class="flex items-center gap-3 px-4 py-3 bg-white/5 rounded-lg border border-white/5">
                    <div
                        class="w-8 h-8 rounded-full bg-nike-green/20 flex items-center justify-center text-nike-green font-bold text-xs border border-nike-green/30">
                        AD
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium text-white truncate">Admin User</p>
                        <p class="text-xs text-zinc-500 truncate">admin@nike-x.com</p>
                    </div>
                    <button class="text-zinc-400 hover:text-white">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-hidden relative z-10">

            <!-- Top Bar -->
            <header
                class="h-20 glass-card-desktop border-b border-white/5 flex items-center justify-between px-4 md:px-8 gap-4">
                <!-- Hamburger Menu -->
                <button onclick="toggleSidebar()" class="md:hidden text-zinc-400 hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>

                <!-- Search -->
                <div class="relative flex-1 md:w-96 md:flex-none">
                    <input type="text" placeholder="Search suppliers..."
                        class="w-full bg-black/20 border border-white/10 rounded-lg py-2 pl-10 pr-4 text-sm text-white placeholder-zinc-500 focus:outline-none focus:border-nike-green/50 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-zinc-500 absolute left-3 top-3"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>

                <!-- Actions -->
                <div class="flex items-center gap-4">
                    <button class="p-2 text-zinc-400 hover:text-white relative">
                        <div class="absolute top-2 right-2 w-2 h-2 bg-nike-green rounded-full animate-pulse"></div>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                        </svg>
                    </button>
                    <button class="p-2 text-zinc-400 hover:text-white hidden md:block">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Scrollable Content -->
            <div class="flex-1 overflow-y-auto p-8 space-y-8">

                <!-- Header -->
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="font-futuristic text-3xl font-bold text-white">Supplier Management</h1>
                        <p class="text-zinc-400 text-sm mt-1">Manage your product suppliers and vendors.</p>
                    </div>
                    <button onclick="openAddSupplierModal()"
                        class="bg-nike-green text-black font-bold py-3 px-6 rounded hover:bg-white transition-colors font-futuristic tracking-wider text-sm flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        ADD SUPPLIER
                    </button>
                </div>

                <!-- Suppliers Table -->
                <div class="glass-card-desktop rounded-xl border border-white/5 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm text-zinc-400">
                            <thead class="bg-white/5 text-xs uppercase font-futuristic tracking-wider text-white">
                                <tr>
                                    <th class="px-6 py-4">Supplier Name</th>
                                    <th class="px-6 py-4">Email</th>
                                    <th class="px-6 py-4">Phone</th>
                                    <th class="px-6 py-4">Status</th>
                                    <th class="px-6 py-4 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-white/5" id="supplier-table-body">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
        <!-- Add Supplier Modal -->
        <div id="add-supplier-modal" class="fixed inset-0 z-50 hidden">
            <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeAddSupplierModal()"></div>
            <div class="absolute inset-y-0 right-0 w-full max-w-xl bg-nike-dark border-l border-white/10 shadow-2xl transform transition-transform duration-300 translate-x-full"
                id="add-supplier-modal-content">
                <div class="h-full flex flex-col">
                    <div class="h-20 flex items-center justify-between px-8 border-b border-white/10 bg-black/20">
                        <h2 class="font-futuristic text-xl font-bold text-white">Add New Supplier</h2>
                        <button onclick="closeAddSupplierModal()"
                            class="text-zinc-400 hover:text-white transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                    <div class="flex-1 overflow-y-auto p-8 space-y-6">
                        <form id="add-supplier-form" class="space-y-6">
                            <div>
                                <label class="block text-xs text-zinc-500 font-futuristic tracking-wider mb-1">COMPANY
                                    NAME</label>
                                <input type="text" id="add-supplier-name"
                                    class="w-full bg-black/20 border border-white/10 rounded px-3 py-2 text-white text-sm focus:border-nike-green focus:outline-none transition-colors">
                            </div>
                            <div>
                                <label class="block text-xs text-zinc-500 font-futuristic tracking-wider mb-1">COMPANY
                                    NUMBER (LANDLINE)</label>
                                <input type="text" id="add-supplier-mobile"
                                    class="w-full bg-black/20 border border-white/10 rounded px-3 py-2 text-white text-sm focus:border-nike-green focus:outline-none transition-colors">
                            </div>
                            <div>
                                <label class="block text-xs text-zinc-500 font-futuristic tracking-wider mb-1">EMAIL
                                    ADDRESS</label>
                                <input type="email" id="add-supplier-email"
                                    class="w-full bg-black/20 border border-white/10 rounded px-3 py-2 text-white text-sm focus:border-nike-green focus:outline-none transition-colors">
                            </div>
                        </form>
                    </div>
                    <div class="p-8 border-t border-white/10 bg-black/20 flex justify-end gap-4">
                        <button onclick="closeAddSupplierModal()"
                            class="px-6 py-3 text-sm font-futuristic tracking-wider text-zinc-400 hover:text-white transition-colors">CANCEL</button>
                        <button onclick="saveNewSupplier()"
                            class="px-6 py-3 bg-nike-green text-black text-sm font-bold font-futuristic tracking-wider rounded hover:bg-white transition-colors">ADD
                            SUPPLIER</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Supplier Modal -->
        <div id="edit-supplier-modal" class="fixed inset-0 z-50 hidden">
            <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeEditSupplierModal()"></div>
            <div class="absolute inset-y-0 right-0 w-full max-w-xl bg-nike-dark border-l border-white/10 shadow-2xl transform transition-transform duration-300 translate-x-full"
                id="edit-supplier-modal-content">
                <div class="h-full flex flex-col">
                    <div class="h-20 flex items-center justify-between px-8 border-b border-white/10 bg-black/20">
                        <h2 class="font-futuristic text-xl font-bold text-white">Edit Supplier</h2>
                        <button onclick="closeEditSupplierModal()"
                            class="text-zinc-400 hover:text-white transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                    <div class="flex-1 overflow-y-auto p-8 space-y-6">
                        <input type="hidden" id="edit-supplier-id">
                        <div>
                            <label class="block text-xs text-zinc-500 font-futuristic tracking-wider mb-1">COMPANY
                                NAME</label>
                            <input type="text" id="edit-supplier-name"
                                class="w-full bg-black/20 border border-white/10 rounded px-3 py-2 text-white text-sm focus:border-nike-green focus:outline-none transition-colors">
                        </div>
                        <div>
                            <label class="block text-xs text-zinc-500 font-futuristic tracking-wider mb-1">MOBILE
                                NUMBER</label>
                            <input type="text" id="edit-supplier-mobile"
                                class="w-full bg-black/20 border border-white/10 rounded px-3 py-2 text-white text-sm focus:border-nike-green focus:outline-none transition-colors">
                        </div>
                        <div>
                            <label class="block text-xs text-zinc-500 font-futuristic tracking-wider mb-1">EMAIL
                                ADDRESS</label>
                            <input type="email" id="edit-supplier-email"
                                class="w-full bg-black/20 border border-white/10 rounded px-3 py-2 text-white text-sm focus:border-nike-green focus:outline-none transition-colors">
                        </div>
                        <div>
                            <label
                                class="block text-xs text-zinc-500 font-futuristic tracking-wider mb-1">STATUS</label>
                            <select id="edit-supplier-status"
                                class="w-full bg-black/20 border border-white/10 rounded px-3 py-2 text-white text-sm focus:border-nike-green focus:outline-none transition-colors">
                                <option value="Active">Active</option>
                                <option value="Inactive">Inactive</option>
                            </select>
                        </div>
                    </div>
                    <div class="p-8 border-t border-white/10 bg-black/20 flex justify-end gap-4">
                        <button onclick="closeEditSupplierModal()"
                            class="px-6 py-3 text-sm font-futuristic tracking-wider text-zinc-400 hover:text-white transition-colors">CANCEL</button>
                        <button onclick="saveSupplierChanges()"
                            class="px-6 py-3 bg-nike-green text-black text-sm font-bold font-futuristic tracking-wider rounded hover:bg-white transition-colors">SAVE
                            CHANGES</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/js/script.js"></script>
    <script src="../assets/js/notiflix-aio-3.2.8.min.js"></script>
    <script src="../assets/js/admin-suppliers.js"></script>
</body>

</html>
