<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike-X | Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Orbitron:wght@500;700;900&family=Oswald:wght@400;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/script.js"></script>
</head>
</head>

<body
    class="bg-nike-dark text-white h-screen overflow-hidden flex selection:bg-nike-green selection:text-black font-sans relative">

    <!-- Mobile Background (Visible only on small screens) -->
    <div class="absolute inset-0 lg:hidden z-0">
        <img src="assets/images/bg.png" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-black/60"></div>
    </div>

    <!-- Left Panel: Product Showcase (60% width on desktop) -->
    <div class="hidden lg:block w-[60%] h-full relative overflow-hidden bg-black">
        <!-- Background Image with Zoom Effect -->
        <div class="absolute inset-0 z-0">
            <img src="assets/images/bg.png" alt="Nike-X Showcase"
                class="w-full h-full object-cover animate-zoom-slow opacity-80">
            <div class="absolute inset-0 bg-gradient-to-r from-black/80 via-transparent to-black/20 mix-blend-multiply">
            </div>
            <div class="absolute inset-0 bg-gradient-to-t from-nike-dark via-transparent to-transparent"></div>
        </div>

        <!-- Branding Overlay -->
        <div class="absolute inset-0 z-10 flex flex-col justify-between p-16">
            <!-- Top Logo -->
            <div class="animate-fade-in-up" style="animation-delay: 0.2s;">
                <h2 class="font-futuristic text-2xl font-bold tracking-widest text-white">NIKE<span
                        class="text-nike-green">-X</span></h2>
            </div>

            <!-- Center/Bottom Big Text -->
            <div class="space-y-2 animate-fade-in-up" style="animation-delay: 0.4s;">
                <p class="font-condensed text-nike-green tracking-[0.3em] text-sm uppercase font-bold mb-4">New
                    Collection Drop</p>
                <h1 class="font-futuristic text-7xl xl:text-8xl font-black leading-none uppercase italic">
                    Future <br>
                    <span class="text-stroke">Ready</span>
                </h1>
                <p class="text-zinc-400 max-w-md mt-6 text-sm leading-relaxed border-l-2 border-nike-green pl-4">
                    Experience the next generation of footwear technology. Adaptive cushioning, self-lacing systems, and
                    sustainable materials.
                </p>
            </div>

            <!-- Bottom Metadata -->
            <div class="flex gap-8 text-[10px] text-zinc-500 font-futuristic tracking-widest uppercase animate-fade-in-up"
                style="animation-delay: 0.6s;">
                <span>System: v2.4.0</span>
                <span>Status: Online</span>
                <span>Region: Global</span>
            </div>
        </div>
    </div>

    <!-- Right Panel: Login Form (40% width on desktop, 100% on mobile) -->
    <div
        class="w-full lg:w-[40%] h-full bg-transparent lg:bg-nike-dark flex flex-col justify-center px-4 sm:px-8 lg:px-16 relative z-20 lg:border-l lg:border-white/5 tech-grid spotlight">

        <!-- Glass Card (Desktop & Mobile) -->
        <div
            class="max-w-md w-full mx-auto animate-slide-in-right mobile-glass-card lg:glass-card-desktop p-8 rounded-2xl relative overflow-hidden">

            <!-- Lava Lamp Bubbles -->
            <div class="absolute inset-0 pointer-events-none">
                <div
                    class="absolute bottom-[-20%] left-[10%] w-24 h-24 bg-nike-green/20 rounded-full blur-xl animate-lava-1">
                </div>
                <div
                    class="absolute bottom-[-20%] left-[40%] w-16 h-16 bg-nike-green/30 rounded-full blur-lg animate-lava-2">
                </div>
                <div
                    class="absolute bottom-[-20%] left-[70%] w-20 h-20 bg-emerald-500/20 rounded-full blur-xl animate-lava-3">
                </div>
                <div
                    class="absolute bottom-[-20%] left-[20%] w-12 h-12 bg-nike-green/25 rounded-full blur-md animate-lava-4">
                </div>
                <div
                    class="absolute bottom-[-20%] left-[80%] w-28 h-28 bg-nike-green/15 rounded-full blur-2xl animate-lava-5">
                </div>
            </div>

            <!-- HUD Corner Accents (Desktop Only visual flair, but kept inside for structure) -->
            <div class="hidden lg:block absolute -top-8 -left-8 w-8 h-8 border-t-2 border-l-2 border-zinc-800"></div>
            <div class="hidden lg:block absolute -bottom-8 -right-8 w-8 h-8 border-b-2 border-r-2 border-zinc-800">
            </div>

            <!-- Mobile Logo (Visible only on mobile) -->
            <div class="lg:hidden mb-8 text-center">
                <h2 class="font-futuristic text-3xl font-bold tracking-widest text-white">NIKE<span
                        class="text-nike-green">-X</span></h2>
            </div>

            <!-- Header -->
            <div class="mb-8 lg:mb-10 text-center lg:text-left">
                <h3 class="font-futuristic text-2xl lg:text-3xl font-bold text-white mb-2">Create Account</h3>
                <p class="text-zinc-400 lg:text-zinc-500 text-sm">Join the future of footwear.</p>
            </div>

            <!-- Form -->
            <form class="space-y-6" onsubmit="event.preventDefault();">

                <!-- Name Row -->
                <div class="flex gap-4">
                    <!-- First Name -->
                    <div class="group relative w-1/2">
                        <input type="text" id="firstName"
                            class="peer w-full bg-transparent border-b border-zinc-600 lg:border-zinc-700 py-3 text-white placeholder-transparent focus:border-nike-green focus:outline-none transition-colors duration-300"
                            placeholder="First Name">
                        <label for="firstName"
                            class="absolute left-0 -top-3.5 text-xs text-zinc-400 lg:text-zinc-500 transition-all peer-placeholder-shown:text-base peer-placeholder-shown:text-zinc-400 peer-placeholder-shown:top-3 peer-focus:-top-3.5 peer-focus:text-xs peer-focus:text-nike-green font-futuristic tracking-wide">
                            FIRST NAME
                        </label>
                    </div>
                    <!-- Last Name -->
                    <div class="group relative w-1/2">
                        <input type="text" id="lastName"
                            class="peer w-full bg-transparent border-b border-zinc-600 lg:border-zinc-700 py-3 text-white placeholder-transparent focus:border-nike-green focus:outline-none transition-colors duration-300"
                            placeholder="Last Name">
                        <label for="lastName"
                            class="absolute left-0 -top-3.5 text-xs text-zinc-400 lg:text-zinc-500 transition-all peer-placeholder-shown:text-base peer-placeholder-shown:text-zinc-400 peer-placeholder-shown:top-3 peer-focus:-top-3.5 peer-focus:text-xs peer-focus:text-nike-green font-futuristic tracking-wide">
                            LAST NAME
                        </label>
                    </div>
                </div>

                <!-- Email Input -->
                <div class="group relative">
                    <input type="email" id="email"
                        class="peer w-full bg-transparent border-b border-zinc-600 lg:border-zinc-700 py-3 text-white placeholder-transparent focus:border-nike-green focus:outline-none transition-colors duration-300"
                        placeholder="Email Address">
                    <label for="email"
                        class="absolute left-0 -top-3.5 text-xs text-zinc-400 lg:text-zinc-500 transition-all peer-placeholder-shown:text-base peer-placeholder-shown:text-zinc-400 peer-placeholder-shown:top-3 peer-focus:-top-3.5 peer-focus:text-xs peer-focus:text-nike-green font-futuristic tracking-wide">
                        EMAIL ADDRESS
                    </label>
                </div>

                <!-- Mobile Input -->
                <div class="group relative">
                    <input type="tel" id="mobile"
                        class="peer w-full bg-transparent border-b border-zinc-600 lg:border-zinc-700 py-3 text-white placeholder-transparent focus:border-nike-green focus:outline-none transition-colors duration-300"
                        placeholder="Mobile Number">
                    <label for="mobile"
                        class="absolute left-0 -top-3.5 text-xs text-zinc-400 lg:text-zinc-500 transition-all peer-placeholder-shown:text-base peer-placeholder-shown:text-zinc-400 peer-placeholder-shown:top-3 peer-focus:-top-3.5 peer-focus:text-xs peer-focus:text-nike-green font-futuristic tracking-wide">
                        MOBILE NUMBER
                    </label>
                </div>

                <!-- Password Input -->
                <div class="group relative">
                    <input type="password" id="password"
                        class="peer w-full bg-transparent border-b border-zinc-600 lg:border-zinc-700 py-3 text-white placeholder-transparent focus:border-nike-green focus:outline-none transition-colors duration-300 pr-10"
                        placeholder="Password">
                    <label for="password"
                        class="absolute left-0 -top-3.5 text-xs text-zinc-400 lg:text-zinc-500 transition-all peer-placeholder-shown:text-base peer-placeholder-shown:text-zinc-400 peer-placeholder-shown:top-3 peer-focus:-top-3.5 peer-focus:text-xs peer-focus:text-nike-green font-futuristic tracking-wide">
                        PASSWORD
                    </label>

                    <!-- Toggle Password -->
                    <button type="button" onclick="togglePassword()"
                        class="absolute right-0 top-3 text-zinc-400 hover:text-nike-green transition-colors">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <svg id="eye-off-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                        </svg>
                    </button>
                </div>

                <!-- Actions -->
                <div class="flex items-center pt-2">
                    <label class="flex items-center space-x-2 cursor-pointer group">
                        <div class="relative">
                            <input type="checkbox" class="peer sr-only">
                            <div
                                class="w-4 h-4 border border-zinc-600 rounded bg-transparent peer-checked:bg-nike-green peer-checked:border-nike-green transition-all">
                            </div>
                            <svg class="w-3 h-3 text-black absolute top-0.5 left-0.5 opacity-0 peer-checked:opacity-100 transition-opacity"
                                fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                            </svg>
                        </div>
                        <span
                            class="text-xs text-zinc-400 group-hover:text-zinc-300 transition-colors font-futuristic tracking-wider">I
                            AGREE TO TERMS & CONDITIONS</span>
                    </label>
                </div>

                <!-- Submit Button -->
                <button type="submit"
                    class="w-full bg-white text-black font-bold py-4 rounded-none hover:bg-nike-green transition-all duration-300 font-futuristic tracking-widest text-sm flex items-center justify-center gap-2 group mt-8 lg:rounded-sm">
                    SIGN UP
                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="h-4 w-4 transition-transform group-hover:translate-x-1" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </button>

            </form>

            <!-- Footer -->
            <div class="mt-10 text-center">
                <p class="text-zinc-500 text-xs font-futuristic tracking-wider">
                    ALREADY A MEMBER?
                    <a href="sign-in.html"
                        class="text-white hover:text-nike-green ml-1 transition-colors border-b border-zinc-700 hover:border-nike-green pb-0.5">SIGN
                        IN</a>
                </p>
            </div>

        </div>
    </div>

</body>

</html>
