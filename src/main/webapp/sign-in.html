<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike-X | Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        futuristic: ['Orbitron', 'sans-serif'],
                    },
                    colors: {
                        'nike-green': '#39ff14', // Neon Green
                        'nike-dark': '#050505',
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            const eyeOffIcon = document.getElementById('eye-off-icon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.add('hidden');
                eyeOffIcon.classList.remove('hidden');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('hidden');
                eyeOffIcon.classList.add('hidden');
            }
        }
    </script>
    <style>
        /* Custom Glassmorphism Utilities */
        .glass-panel {
            /* Removed dark tint (rgba 20,20,20) and replaced with ultra-transparent white */
            background: rgba(255, 255, 255, 0.01);
            /* Removed saturate(180%) to prevent color shifting/tinting of background elements */
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .glass-input {
            /* Changed from dark tint to neutral transparent white */
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
        }

        /* Smooth text rendering */
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Autofill fix for dark mode inputs */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px rgba(0,0,0,0.3) inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        /* Background Image Styling */
        body {
            background-image: url("assets/images/bg.png"); /* Placeholder image */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Removed the dark overlay by setting background to transparent */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: transparent; /* No darkening */
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-nike-dark text-white h-screen flex items-center justify-center overflow-hidden relative selection:bg-nike-green selection:text-black">

<!-- Background Ambient Effects -->
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-nike-green/20 rounded-full blur-[128px] animate-pulse-slow pointer-events-none"></div>
<div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-emerald-600/20 rounded-full blur-[100px] animate-float pointer-events-none"></div>

<main class="relative z-10 w-full max-w-[420px] p-4">

    <div class="glass-panel rounded-3xl p-8 sm:p-10 relative overflow-hidden group">

        <!-- Top sheen effect -->
        <div class="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>

        <div class="text-center mb-10">
            <h1 class="font-futuristic text-4xl font-black tracking-wider italic">
                NIKE<span class="text-nike-green drop-shadow-[0_0_10px_rgba(57,255,20,0.8)]">-X</span>
            </h1>
            <p class="text-zinc-400 text-xs tracking-[0.2em] mt-2 uppercase">Step into the future</p>
        </div>

        <form class="space-y-6" onsubmit="event.preventDefault();">

            <div class="space-y-2">
                <label for="email" class="text-xs font-futuristic text-zinc-400 ml-1">Access ID / Email</label>
                <div class="relative group/input">
                    <input type="email" id="email"
                           class="glass-input w-full rounded-xl px-4 py-3.5 text-sm text-white placeholder-zinc-600 outline-none focus:border-nike-green/50 focus:ring-1 focus:ring-nike-green/50 transition-all duration-300 pr-10"
                           placeholder="runner@nikex.com">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 absolute right-4 top-3.5 text-zinc-600 group-focus-within/input:text-nike-green transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
                    </svg>
                </div>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center ml-1">
                    <label for="password" class="text-xs font-futuristic text-zinc-400">Passcode</label>
                    <a href="#" class="text-xs text-nike-green/80 hover:text-nike-green hover:underline decoration-nike-green/50 transition-colors">Forgot?</a>
                </div>
                <div class="relative group/input">
                    <input type="password" id="password"
                           class="glass-input w-full rounded-xl px-4 py-3.5 text-sm text-white placeholder-zinc-600 outline-none focus:border-nike-green/50 focus:ring-1 focus:ring-nike-green/50 transition-all duration-300 pr-10"
                           placeholder="••••••••">

                    <!-- Toggle Password Button -->
                    <button type="button" onclick="togglePassword()" class="absolute right-4 top-3.5 text-zinc-600 hover:text-nike-green focus:outline-none transition-colors">
                        <!-- Eye Icon (Show) -->
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <!-- Eye Off Icon (Hide) -->
                        <svg id="eye-off-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Remember Me Checkbox -->
            <div class="flex items-center gap-3 ml-1">
                <div class="relative flex items-center">
                    <input type="checkbox" id="remember" class="peer h-4 w-4 cursor-pointer appearance-none rounded border border-zinc-600 bg-black/30 checked:border-nike-green checked:bg-nike-green transition-all hover:border-zinc-500">
                    <svg class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-3 h-3 text-black opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
                <label for="remember" class="text-xs text-zinc-400 cursor-pointer select-none hover:text-zinc-300 transition-colors font-futuristic tracking-wide">Stay Logged In</label>
            </div>

            <!-- Updated Button: Solid White (Normal Form) -->
            <button type="button" class="w-full group relative mt-8 overflow-hidden rounded-xl bg-white text-black font-bold py-4 transition-all hover:scale-[1.02] active:scale-[0.98]">
                <div class="absolute inset-0 bg-gradient-to-r from-nike-green to-emerald-400 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                <span class="relative font-futuristic tracking-widest text-sm z-10 flex items-center justify-center gap-2">
                        INITIATE LOGIN
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transition-transform group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                        </svg>
                    </span>
            </button>

        </form>

        <!-- Sign Up Link -->
        <div class="mt-8 text-center">
            <p class="text-zinc-500 text-xs font-futuristic tracking-wider">
                NO ACCESS ID?
                <a href="#" class="text-white hover:text-nike-green ml-1 transition-colors border-b border-transparent hover:border-nike-green pb-0.5">REGISTER PROTOCOL</a>
            </p>
        </div>

    </div>
</main>

</body>
</html>
