<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike-X | My Orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-dark': '#0f0f11',
                        'brand-accent': '#22c55e',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-black text-white antialiased selection:bg-green-500 selection:text-white overflow-x-hidden">

    <!-- Gradient Background Drops -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
        <div class="gradient-blob top-[-20%] left-[-10%]"></div>
        <div class="gradient-blob bottom-[-20%] right-[-10%] bg-emerald-600/30 w-[800px] h-[800px]"></div>
    </div>
    </div>

    <!-- Header -->
    <div id="header-placeholder"></div>
    <script src="../assets/js/components/header.js"></script>
    <script>
        loadHeader('..');
    </script>

    <main class="container mx-auto px-6 pt-32 pb-24 min-h-screen">

        <!-- Back Button -->
        <button onclick="history.back()"
            class="mb-6 text-gray-400 hover:text-white transition-colors flex items-center gap-2">
            <i class="fas fa-arrow-left"></i> Back
        </button>

        <div class="flex items-center justify-between mb-8">
            <h1 class="text-4xl font-bold">My Orders</h1>
            <div class="bg-white/5 rounded-full px-4 py-2 text-sm text-gray-400 border border-white/10">
                <i class="fas fa-history mr-2"></i> Order History
            </div>
        </div>

        <!-- Orders Container -->
        <div id="orders-container" class="space-y-4">
            <!-- Loading State -->
            <div class="glass-panel p-8 rounded-2xl animate-pulse text-center text-gray-500">
                Loading orders...
            </div>
        </div>

    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>
    <script src="../assets/js/components/footer.js"></script>
    <script>
        loadFooter('..');
    </script>

    <script src="https://cdn.jsdelivr.net/npm/notiflix@3.2.6/dist/notiflix-3.2.6.min.js"></script>
    <script src="../assets/js/orders.js"></script>
</body>

</html>
