<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike-X | My Wishlist</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-dark': '#0f0f11',
                        'brand-accent': '#22c55e', // Green-500
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-black text-white antialiased selection:bg-green-500 selection:text-white">

    <!-- Gradient Background (Frosted Glass Foundation) -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
        <div class="gradient-blob top-[-20%] left-[-10%]"></div>
        <div class="gradient-blob bottom-[-20%] right-[-10%] bg-emerald-600/30 w-[800px] h-[800px]"></div>
    </div>

    <!-- Header -->
    <div id="header-placeholder"></div>
    <!-- Pass '../' as basePath for header -->
    <script src="../assets/js/components/header.js"></script>
    <script>
        loadHeader('../');
    </script>

    <!-- Navigation Back -->
    <div class="relative z-10 container mx-auto px-6 pt-24 pb-4">
        <button onclick="history.back()"
            class="text-gray-400 hover:text-white transition-colors flex items-center gap-2">
            <i class="fas fa-arrow-left"></i> Back
        </button>
    </div>

    <!-- Main Content -->
    <main class="relative z-10 pb-12 container mx-auto px-6 min-h-screen">

        <div class="glass-panel rounded-3xl p-8 animate-fade-in-up">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold">My Wishlist</h1>
                <span
                    class="bg-white/10 px-3 py-1 rounded-full text-sm font-medium text-green-400 border border-white/5"
                    id="wishlist-count">
                    0 Items
                </span>
            </div>

            <!-- Wishlist Grid -->
            <div id="wishlist-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Loading State -->
                <div class="col-span-full h-64 flex flex-col items-center justify-center text-gray-500">
                    <i class="fas fa-spinner fa-spin fa-2x mb-4 text-green-500"></i>
                    <p>Loading your favorites...</p>
                </div>
            </div>

            <!-- Empty State (Hidden by default) -->
            <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 text-center">
                <div class="w-24 h-24 bg-white/5 rounded-full flex items-center justify-center mb-6">
                    <i class="far fa-heart text-4xl text-gray-600"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">Your wishlist is empty</h3>
                <p class="text-gray-400 mb-8 max-w-md">Looks like you haven't added any items yet. Explore our latest
                    drops and save your favorites!</p>
                <a href="../advanced-search.html"
                    class="glass-morphism px-8 py-3 rounded-full font-bold hover:bg-white/10 transition-all border border-white/10 hover:border-green-500/50">
                    Explore Products
                </a>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>
    <script src="../assets/js/components/footer.js"></script>
    <script src="../assets/js/notiflix-aio-3.2.8.min.js"></script>
    <script src="../assets/js/wishlist.js"></script>
    <script>
        loadFooter('../');
    </script>

</body>

</html>
